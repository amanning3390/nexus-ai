<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88"/>
      <stop offset="50%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FF7"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad)" stroke-width="8"/>
  
  <!-- Infinity loop -->
  <path d="M 156 256 
           C 156 156, 256 156, 256 256 
           C 256 356, 356 356, 356 256
           C 356 156, 256 156, 256 256
           C 256 356, 156 356, 156 256" 
        fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Circuit nodes on infinity -->
  <circle cx="156" cy="256" r="20" fill="#00FF88"/>
  <circle cx="256" cy="256" r="30" fill="#00D4FF"/>
  <circle cx="356" cy="256" r="20" fill="#7B2FF7"/>
  
  <!-- Small nodes -->
  <circle cx="206" cy="196" r="10" fill="#00FF88" opacity="0.7"/>
  <circle cx="306" cy="196" r="10" fill="#00D4FF" opacity="0.7"/>
  <circle cx="206" cy="316" r="10" fill="#00D4FF" opacity="0.7"/>
  <circle cx="306" cy="316" r="10" fill="#7B2FF7" opacity="0.7"/>
  
  <!-- N -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="72" 
         font-weight="bold" fill="#0A0A0F" text-anchor="middle">N</text>
</svg>
