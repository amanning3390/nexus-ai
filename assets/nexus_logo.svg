<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0A0A0F"/>
  
  <!-- Hexagon outer -->
  <polygon points="256,60 420,150 420,360 256,450 92,360 92,150" 
           fill="none" stroke="url(#grad)" stroke-width="12"/>
  
  <!-- Inner hexagon -->
  <polygon points="256,120 360,180 360,330 256,390 152,330 152,180" 
           fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.6"/>
  
  <!-- Center node -->
  <circle cx="256" cy="255" r="40" fill="url(#grad)"/>
  
  <!-- Connected nodes -->
  <circle cx="256" cy="90" r="20" fill="#00FF88"/>
  <circle cx="430" cy="165" r="20" fill="#00D4FF"/>
  <circle cx="430" cy="345" r="20" fill="#00FF88"/>
  <circle cx="256" cy="420" r="20" fill="#00D4FF"/>
  <circle cx="82" cy="345" r="20" fill="#00FF88"/>
  <circle cx="82" cy="165" r="20" fill="#00D4FF"/>
  
  <!-- Connection lines -->
  <line x1="256" y1="130" x2="256" y2="110" stroke="url(#grad)" stroke-width="4"/>
  <line x1="360" y1="195" x2="385" y2="180" stroke="url(#grad)" stroke-width="4"/>
  <line x1="360" y1="315" x2="385" y2="330" stroke="url(#grad)" stroke-width="4"/>
  <line x1="256" y1="380" x2="256" y2="400" stroke="url(#grad)" stroke-width="4"/>
  <line x1="152" y1="315" x2="127" y2="330" stroke="url(#grad)" stroke-width="4"/>
  <line x1="152" y1="195" x2="127" y2="180" stroke="url(#grad)" stroke-width="4"/>
  
  <!-- N letter for Nexus -->
  <text x="256" y="275" font-family="Arial, sans-serif" font-size="48" 
         font-weight="bold" fill="#0A0A0F" text-anchor="middle">N</text>
</svg>
