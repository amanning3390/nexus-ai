<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FF7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0A0A0F"/>
  
  <!-- Brain network pattern -->
  <!-- Left hemisphere -->
  <ellipse cx="170" cy="256" rx="80" ry="120" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.5"/>
  <ellipse cx="170" cy="256" rx="50" ry="80" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.7"/>
  <ellipse cx="170" cy="256" rx="20" ry="35" fill="#00D4FF" opacity="0.8"/>
  
  <!-- Right hemisphere -->
  <ellipse cx="342" cy="256" rx="80" ry="120" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.5"/>
  <ellipse cx="342" cy="256" rx="50" ry="80" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.7"/>
  <ellipse cx="342" cy="256" rx="20" ry="35" fill="#7B2FF7" opacity="0.8"/>
  
  <!-- Neural connections -->
  <line x1="150" y1="180" x2="362" y2="180" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <line x1="130" y1="256" x2="382" y2="256" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <line x1="150" y1="332" x2="362" y2="332" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <line x1="190" y1="150" x2="322" y2="150" stroke="#00FF88" stroke-width="2"/>
  <line x1="190" y1="362" x2="322" y2="362" stroke="#00FF88" stroke-width="2"/>
  
  <!-- Synaptic dots -->
  <circle cx="190" cy="150" r="8" fill="#00FF88"/>
  <circle cx="256" cy="130" r="10" fill="#00D4FF"/>
  <circle cx="322" cy="150" r="8" fill="#7B2FF7"/>
  <circle cx="150" cy="256" r="12" fill="#00D4FF"/>
  <circle cx="362" cy="256" r="12" fill="#7B2FF7"/>
  <circle cx="190" cy="362" r="8" fill="#00FF88"/>
  <circle cx="256" cy="382" r="10" fill="#00D4FF"/>
  <circle cx="322" cy="362" r="8" fill="#7B2FF7"/>
  
  <!-- N letter -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="80" 
         font-weight="bold" fill="url(#grad)" text-anchor="middle">N</text>
</svg>
